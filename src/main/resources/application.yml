spring:
  application:
    name: erp-layout

  datasource:
    url: jdbc:postgresql://localhost:5432/erp_layout
    username: ${DB_USERNAME:erp_admin}
    password: ${DB_PASSWORD:admin1234}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8082

jwt:
  secret: ${JWT_SECRET:change-this-super-secret-key-very-long-32-bytes-min}

management:
  endpoints:
    web:
      exposure:
        include: health, info

app:
  version: 1.0.0